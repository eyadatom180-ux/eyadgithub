<model-viewer
    src="gokart-fast-normal.glb"
    ios-src="gokart.usdz"
    alt="Cake"

    camera-controls
    auto-rotate
    auto-rotate-delay="0"

    reveal="auto"
    loading="eager"

    ar
    ar-modes="scene-viewer quick-look webxr"

    shadow-intensity="1"
    environment-image="neutral"

    style="width:100%;height:100vh;background:transparent;">

    <button slot="ar-button" class="ar-button">
        📱 View in AR
    </button>

</model-viewer>
